<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .algorithm {
            background-color: white;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #555;
        }
        .complexity {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .steps {
            margin: 10px 0;
        }
        .array-display {
            font-family: monospace;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .highlight {
            background-color: yellow;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>選擇排序法 (Selection Sort)</h1>
    <div class="algorithm">
        <p><strong>原理：</strong>選擇排序是一種簡單直觀的排序算法。它的工作原理是每一次從待排序的數據元素中選出最小（或最大）的一個元素，存放在序列的起始位置，直到全部待排序的數據元素排完。</p>
        <div class="steps">
            <strong>操作步驟：</strong>
            <ol>
                <li>在未排序序列中找到最小元素，存放到排序序列的起始位置。</li>
                <li>再從剩餘未排序元素中繼續尋找最小元素，然後放到已排序序列的末尾。</li>
                <li>以此類推，直到所有元素均排序完畢。</li>
            </ol>
        </div>
        <div class="complexity">
            <strong>時間複雜度：</strong> 最壞情況 O(n²)，平均情況 O(n²)，最佳情況 O(n²)<br>
            <strong>空間複雜度：</strong> O(1)
        </div>
        <div class="array-display" id="selection-array">[5, 3, 8, 4, 2]</div>
        <button onclick="startSelectionSort()">開始排序</button>
        <button onclick="nextSelectionStep()">下一步</button>
        <button onclick="resetSelection()">重置</button>
    </div>
    <a href="index.html">返回主頁</a>

    <script>
        // 選擇排序
        let selectionArray = [5, 3, 8, 4, 2];
        let selectionStep = 0;
        let selectionI = 0, selectionMinIdx = 0;

        function displayArray(array, elementId, highlightIndices = []) {
            const display = document.getElementById(elementId);
            display.innerHTML = array.map((val, idx) => 
                highlightIndices.includes(idx) ? `<span class="highlight">${val}</span>` : val
            ).join(', ');
        }

        function startSelectionSort() {
            selectionArray = [5, 3, 8, 4, 2];
            selectionStep = 0;
            selectionI = 0;
            selectionMinIdx = 0;
            displayArray(selectionArray, 'selection-array');
        }

        function nextSelectionStep() {
            if (selectionI < selectionArray.length - 1) {
                if (selectionMinIdx === selectionI) {
                    selectionMinIdx = selectionI;
                    for (let j = selectionI + 1; j < selectionArray.length; j++) {
                        if (selectionArray[j] < selectionArray[selectionMinIdx]) {
                            selectionMinIdx = j;
                        }
                    }
                    displayArray(selectionArray, 'selection-array', [selectionI, selectionMinIdx]);
                } else {
                    [selectionArray[selectionI], selectionArray[selectionMinIdx]] = [selectionArray[selectionMinIdx], selectionArray[selectionI]];
                    displayArray(selectionArray, 'selection-array');
                    selectionI++;
                    selectionMinIdx = selectionI;
                }
            }
        }

        function resetSelection() {
            startSelectionSort();
        }
    </script>
</body>
</html>
