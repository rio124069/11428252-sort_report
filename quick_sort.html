<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: linear-gradient(to bottom, #000428, #004e92);
            color: white;
            overflow-x: hidden;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: shoot 3s linear infinite;
        }
        @keyframes shoot {
            0% { transform: translateX(-100vw) translateY(-100vh); opacity: 1; }
            100% { transform: translateX(100vw) translateY(100vh); opacity: 0; }
        }
        h1 {
            text-align: center;
            color: white;
            text-shadow: 0 0 10px #fff;
        }
        .algorithm {
            background-color: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        h2 {
            color: #fff;
        }
        .complexity {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .steps {
            margin: 10px 0;
        }
        .array-display {
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            color: white;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .highlight {
            background-color: yellow;
            color: black;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: rgba(255, 255, 255, 0.1);
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        th {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .chart-container {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            min-height: 220px;
            padding: 10px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
        }
        .bar {
            flex: 1;
            position: relative;
            background: rgba(76, 175, 80, 0.8);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-size: 12px;
            min-width: 16px;
        }
        .bar.highlight {
            background: rgba(255, 152, 0, 0.9);
        }
        .bar-label {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 4px;
            white-space: nowrap;
            font-size: 12px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <h1>快速排序法 (Quick Sort)</h1>

    <div class="algorithm">
        <h2>快速排序法介紹</h2>
        <p><strong>原理：</strong>快速排序是一種分治算法。它選擇一個基準元素，將數列分成兩部分，一部分小於基準，一部分大於基準，然後對兩部分遞歸地進行排序。</p>
        <p><strong>操作方式：</strong>選擇一個基準元素（通常是數列的第一個元素）。將數列分成兩部分：小於基準的元素和大於基準的元素。對左右兩部分遞歸地進行快速排序。合併結果。</p>
        <p><strong>複雜度分析：</strong>時間複雜度：最壞情況 O(n²)，平均情況 O(n log n)，最佳情況 O(n log n)；空間複雜度：O(log n)。</p>
    </div>

    <div class="algorithm">
        <h2>數據模擬與效能比較</h2>
        <button onclick="runSimulation()">運行模擬</button>
        <table id="results-table">
            <thead>
                <tr>
                    <th>陣列大小 (n)</th>
                    <th>快速排序時間 (ms)</th>
                </tr>
            </thead>
            <tbody>
                <!-- 結果將動態插入 -->
            </tbody>
        </table>
    </div>

    <div class="algorithm">
        <h2>快速排序模擬</h2>
        <div id="quick-sim-chart" class="chart-container"></div>
        <div id="quick-sim-info" class="steps"></div>
        <button onclick="initQuickSimulation()">初始化模擬</button>
        <button onclick="nextQuickSimStep()">下一步</button>
        <button onclick="startQuickAutoPlay()">自動播放</button>
        <button onclick="stopQuickAutoPlay()">停止</button>
        <button onclick="resetQuickSimulation()">重置</button>
    </div>

    <a href="index.html">返回主頁</a>

    <script>
        // 生成星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
            for (let i = 0; i < 5; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = Math.random() * 100 + '%';
                shootingStar.style.top = Math.random() * 100 + '%';
                shootingStar.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(shootingStar);
            }
        }
        createStars();

        // 快速排序
        function quickSort(arr, low, high) {
            if (low < high) {
                let pi = partition(arr, low, high);
                quickSort(arr, low, pi - 1);
                quickSort(arr, pi + 1, high);
            }
            return arr;
        }

        function partition(arr, low, high) {
            let pivot = arr[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            return i + 1;
        }

        // 數據模擬
        function runSimulation() {
            const sizes = [10, 100, 500, 1000];
            const resultsBody = document.querySelector('#results-table tbody');
            resultsBody.innerHTML = '';

            sizes.forEach(size => {
                const arr = Array.from({length: size}, () => Math.floor(Math.random() * 1000));
                const start = performance.now();
                quickSort(arr.slice(), 0, arr.length - 1);
                const end = performance.now();
                const time = (end - start).toFixed(3);

                const row = document.createElement('tr');
                row.innerHTML = `<td>${size}</td><td>${time}</td>`;
                resultsBody.appendChild(row);
            });
        }

        let quickSimArray = [5, 3, 8, 4, 2];
        let quickSimSteps = [];
        let quickSimStepIndex = 0;
        let quickAutoTimer = null;

        function initQuickSimulation() {
            quickSimArray = [5, 3, 8, 4, 2];
            quickSimSteps = [];
            quickSimStepIndex = 0;
            recordQuickSteps(quickSimArray.slice());
            renderQuickSimulation();
        }

        function recordQuickSteps(arr) {
            quickSimSteps.push({ array: arr.slice(), highlight: [], text: '初始陣列' });
            quickSortRecord(arr, 0, arr.length - 1);
            quickSimSteps.push({ array: arr.slice(), highlight: [], text: '排序完成' });
        }

        function quickSortRecord(arr, low, high) {
            if (low < high) {
                const pi = partitionRecord(arr, low, high);
                quickSortRecord(arr, low, pi - 1);
                quickSortRecord(arr, pi + 1, high);
            }
        }

        function partitionRecord(arr, low, high) {
            const pivot = arr[high];
            quickSimSteps.push({ array: arr.slice(), highlight: [high], text: `選取樞軸 ${pivot}（索引 ${high}）` });
            let i = low - 1;
            for (let j = low; j < high; j++) {
                quickSimSteps.push({ array: arr.slice(), highlight: [j, high], text: `比較索引 ${j} 與樞軸` });
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    quickSimSteps.push({ array: arr.slice(), highlight: [i, j], text: `交換索引 ${i} 和 ${j}` });
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            quickSimSteps.push({ array: arr.slice(), highlight: [i + 1, high], text: `樞軸移至位置 ${i + 1}` });
            return i + 1;
        }

        function renderQuickSimulation() {
            const container = document.getElementById('quick-sim-chart');
            const info = document.getElementById('quick-sim-info');
            const step = quickSimSteps[quickSimStepIndex] || { array: quickSimArray, highlight: [], text: '' };
            container.innerHTML = '';
            const maxValue = Math.max(...step.array, 1);
            step.array.forEach((value, idx) => {
                const bar = document.createElement('div');
                bar.className = 'bar' + (step.highlight.includes(idx) ? ' highlight' : '');
                bar.style.height = `${(value / maxValue) * 100}%`;
                bar.innerHTML = `<span class="bar-label">${value}</span>`;
                container.appendChild(bar);
            });
            info.textContent = `步驟 ${quickSimStepIndex + 1} / ${quickSimSteps.length}：${step.text}`;
        }

        function nextQuickSimStep() {
            if (quickSimSteps.length === 0) {
                initQuickSimulation();
                return;
            }
            if (quickSimStepIndex < quickSimSteps.length - 1) {
                quickSimStepIndex++;
                renderQuickSimulation();
            }
        }

        function resetQuickSimulation() {
            quickSimStepIndex = 0;
            if (quickSimSteps.length === 0) {
                initQuickSimulation();
                return;
            }
            renderQuickSimulation();
        }

        function startQuickAutoPlay() {
            if (quickSimSteps.length === 0) {
                initQuickSimulation();
            }
            stopQuickAutoPlay();
            quickAutoTimer = setInterval(() => {
                if (quickSimStepIndex < quickSimSteps.length - 1) {
                    quickSimStepIndex++;
                    renderQuickSimulation();
                } else {
                    stopQuickAutoPlay();
                }
            }, 700);
        }

        function stopQuickAutoPlay() {
            if (quickAutoTimer) {
                clearInterval(quickAutoTimer);
                quickAutoTimer = null;
            }
        }
    </script>
</body>
</html>
