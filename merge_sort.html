<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .algorithm {
            background-color: white;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #555;
        }
        .complexity {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .steps {
            margin: 10px 0;
        }
        .array-display {
            font-family: monospace;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .highlight {
            background-color: yellow;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>合併排序法 (Merge Sort)</h1>
    <div class="algorithm">
        <p><strong>原理：</strong>合併排序是一種分治算法。它將數列分成兩個子數列，對每個子數列進行排序，然後將兩個已排序的子數列合併成一個有序數列。</p>
        <div class="steps">
            <strong>操作步驟：</strong>
            <ol>
                <li>將數列分成兩個子數列。</li>
                <li>對每個子數列遞歸地進行合併排序。</li>
                <li>將兩個已排序的子數列合併成一個有序數列。</li>
            </ol>
        </div>
        <div class="complexity">
            <strong>時間複雜度：</strong> 最壞情況 O(n log n)，平均情況 O(n log n)，最佳情況 O(n log n)<br>
            <strong>空間複雜度：</strong> O(n)
        </div>
        <div class="array-display" id="merge-array">[5, 3, 8, 4, 2]</div>
        <button onclick="startMergeSort()">開始排序</button>
        <button onclick="nextMergeStep()">下一步</button>
        <button onclick="resetMerge()">重置</button>
    </div>
    <a href="index.html">返回主頁</a>

    <script>
        // 合併排序 (簡化版本，展示步驟)
        let mergeArray = [5, 3, 8, 4, 2];
        let mergeStep = 0;

        function displayArray(array, elementId, highlightIndices = []) {
            const display = document.getElementById(elementId);
            display.innerHTML = array.map((val, idx) => 
                highlightIndices.includes(idx) ? `<span class="highlight">${val}</span>` : val
            ).join(', ');
        }

        function startMergeSort() {
            mergeArray = [5, 3, 8, 4, 2];
            mergeStep = 0;
            displayArray(mergeArray, 'merge-array');
        }

        function nextMergeStep() {
            // 簡化展示：直接顯示排序後的結果
            if (mergeStep === 0) {
                displayArray([3, 5, 8, 4, 2], 'merge-array');
                mergeStep++;
            } else if (mergeStep === 1) {
                displayArray([3, 4, 5, 8, 2], 'merge-array');
                mergeStep++;
            } else if (mergeStep === 2) {
                displayArray([2, 3, 4, 5, 8], 'merge-array');
                mergeStep++;
            }
        }

        function resetMerge() {
            startMergeSort();
        }
    </script>
</body>
</html>
