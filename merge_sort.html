<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: linear-gradient(to bottom, #000428, #004e92);
            color: white;
            overflow-x: hidden;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: shoot 3s linear infinite;
        }
        @keyframes shoot {
            0% { transform: translateX(-100vw) translateY(-100vh); opacity: 1; }
            100% { transform: translateX(100vw) translateY(100vh); opacity: 0; }
        }
        h1 {
            text-align: center;
            color: white;
            text-shadow: 0 0 10px #fff;
        }
        .algorithm {
            background-color: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        h2 {
            color: #fff;
        }
        .complexity {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .steps {
            margin: 10px 0;
        }
        .array-display {
            font-family: monospace;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            color: white;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .highlight {
            background-color: yellow;
            color: black;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: rgba(255, 255, 255, 0.1);
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        th {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .chart-container {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            min-height: 220px;
            padding: 10px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
        }
        .bar {
            flex: 1;
            position: relative;
            background: rgba(76, 175, 80, 0.8);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-size: 12px;
            min-width: 16px;
        }
        .bar.highlight {
            background: rgba(255, 152, 0, 0.9);
        }
        .bar-label {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 4px;
            white-space: nowrap;
            font-size: 12px;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>合併排序法 (Merge Sort)</h1>
    <div class="stars" id="stars"></div>

    <div class="algorithm">
        <h2>合併排序法介紹</h2>
        <p><strong>原理：</strong>合併排序是一種分治算法。它將數列分成兩個子數列，對每個子數列進行排序，然後將兩個已排序的子數列合併成一個有序數列。</p>
        <p><strong>操作方式：</strong>將數列分成兩個子數列。對每個子數列遞歸地進行合併排序。將兩個已排序的子數列合併成一個有序數列。</p>
        <p><strong>複雜度分析：</strong>時間複雜度：最壞情況 O(n log n)，平均情況 O(n log n)，最佳情況 O(n log n)；空間複雜度：O(n)。</p>
    </div>

    <div class="algorithm">
        <h2>數據模擬與效能測試</h2>
        <button onclick="runSimulation()">運行模擬</button>
        <table id="results-table">
            <thead>
                <tr>
                    <th>陣列大小 (n)</th>
                    <th>合併排序時間 (ms)</th>
                </tr>
            </thead>
            <tbody>
                <!-- 結果將動態插入 -->
            </tbody>
        </table>
    </div>

    <div class="algorithm">
        <h2>合併排序模擬</h2>
        <div id="merge-sim-chart" class="chart-container"></div>
        <div id="merge-sim-info" class="steps"></div>
        <button onclick="initMergeSimulation()">初始化模擬</button>
        <button onclick="nextMergeSimStep()">下一步</button>
        <button onclick="startMergeAutoPlay()">自動播放</button>
        <button onclick="stopMergeAutoPlay()">停止</button>
        <button onclick="resetMergeSimulation()">重置</button>
    </div>

    <a href="index.html">返回主頁</a>

    <script>
        // 生成星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            if (!starsContainer) return;
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
            for (let i = 0; i < 5; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = Math.random() * 100 + '%';
                shootingStar.style.top = Math.random() * 100 + '%';
                shootingStar.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(shootingStar);
            }
        }
        createStars();

        // 排序函數
        function bubbleSort(arr) {
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                }
            }
            return arr;
        }

        function selectionSort(arr) {
            for (let i = 0; i < arr.length; i++) {
                let minIdx = i;
                for (let j = i + 1; j < arr.length; j++) {
                    if (arr[j] < arr[minIdx]) minIdx = j;
                }
                [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
            }
            return arr;
        }

        function insertionSort(arr) {
            for (let i = 1; i < arr.length; i++) {
                let key = arr[i];
                let j = i - 1;
                while (j >= 0 && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                }
                arr[j + 1] = key;
            }
            return arr;
        }

        function mergeSort(arr) {
            if (arr.length <= 1) return arr;
            const mid = Math.floor(arr.length / 2);
            const left = mergeSort(arr.slice(0, mid));
            const right = mergeSort(arr.slice(mid));
            return merge(left, right);
        }

        function merge(left, right) {
            let result = [];
            while (left.length && right.length) {
                if (left[0] < right[0]) result.push(left.shift());
                else result.push(right.shift());
            }
            return result.concat(left, right);
        }

        function quickSort(arr, low = 0, high = arr.length - 1) {
            if (low < high) {
                let pi = partition(arr, low, high);
                quickSort(arr, low, pi - 1);
                quickSort(arr, pi + 1, high);
            }
            return arr;
        }

        function partition(arr, low, high) {
            let pivot = arr[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            return i + 1;
        }

        // 數據模擬
        function runSimulation() {
            const sizes = [10, 100, 500, 1000];
            const resultsBody = document.querySelector('#results-table tbody');
            resultsBody.innerHTML = '';

            sizes.forEach(size => {
                const arr = Array.from({length: size}, () => Math.floor(Math.random() * 1000));
                const mergeArr = arr.slice();
                const startMerge = performance.now();
                mergeSort(mergeArr);
                const endMerge = performance.now();
                const timeMerge = (endMerge - startMerge).toFixed(3);

                const row = document.createElement('tr');
                row.innerHTML = `<td>${size}</td><td>${timeMerge}</td>`;
                resultsBody.appendChild(row);
            });
        }

        let mergeSimArray = [5, 3, 8, 4, 2];
        let mergeSimSteps = [];
        let mergeSimStepIndex = 0;
        let mergeAutoTimer = null;

        function initMergeSimulation() {
            mergeSimArray = [5, 3, 8, 4, 2];
            mergeSimSteps = [];
            mergeSimStepIndex = 0;
            recordMergeSteps(mergeSimArray.slice());
            renderMergeSimulation();
        }

        function recordMergeSteps(arr) {
            const working = arr.slice();
            mergeSimSteps.push({ array: working.slice(), highlight: [], text: '初始陣列' });

            function mergeRange(start, end) {
                if (end - start <= 1) return working.slice(start, end);
                const mid = Math.floor((start + end) / 2);
                const left = mergeRange(start, mid);
                const right = mergeRange(mid, end);
                let i = 0;
                let j = 0;
                const merged = [];

                while (i < left.length && j < right.length) {
                    const leftIdx = start + i;
                    const rightIdx = mid + j;
                    mergeSimSteps.push({ array: working.slice(), highlight: [leftIdx, rightIdx], text: `比較元素 ${left[i]} 和 ${right[j]}` });
                    if (left[i] <= right[j]) {
                        merged.push(left[i++]);
                    } else {
                        merged.push(right[j++]);
                    }
                    const temp = working.slice();
                    for (let k = 0; k < merged.length; k++) {
                        temp[start + k] = merged[k];
                    }
                    mergeSimSteps.push({ array: temp, highlight: [start + merged.length - 1], text: `合併到位置 ${start + merged.length - 1}` });
                }

                while (i < left.length) {
                    merged.push(left[i++]);
                    const temp = working.slice();
                    for (let k = 0; k < merged.length; k++) {
                        temp[start + k] = merged[k];
                    }
                    mergeSimSteps.push({ array: temp, highlight: [start + merged.length - 1], text: `合併左半段元素 ${merged[merged.length - 1]}` });
                }

                while (j < right.length) {
                    merged.push(right[j++]);
                    const temp = working.slice();
                    for (let k = 0; k < merged.length; k++) {
                        temp[start + k] = merged[k];
                    }
                    mergeSimSteps.push({ array: temp, highlight: [start + merged.length - 1], text: `合併右半段元素 ${merged[merged.length - 1]}` });
                }

                for (let k = 0; k < merged.length; k++) {
                    working[start + k] = merged[k];
                }
                const mergedIndices = Array.from({ length: merged.length }, (_, idx) => start + idx);
                mergeSimSteps.push({ array: working.slice(), highlight: mergedIndices, text: `完成合併段 ${start} 到 ${end - 1}` });
                return working.slice(start, end);
            }

            mergeRange(0, working.length);
            mergeSimSteps.push({ array: working.slice(), highlight: [], text: '排序完成' });
        }

        function renderMergeSimulation() {
            const container = document.getElementById('merge-sim-chart');
            const info = document.getElementById('merge-sim-info');
            const step = mergeSimSteps[mergeSimStepIndex] || { array: mergeSimArray, highlight: [], text: '' };
            container.innerHTML = '';
            const maxValue = Math.max(...step.array, 1);
            step.array.forEach((value, idx) => {
                const bar = document.createElement('div');
                bar.className = 'bar' + (step.highlight.includes(idx) ? ' highlight' : '');
                bar.style.height = `${(value / maxValue) * 100}%`;
                bar.innerHTML = `<span class="bar-label">${value}</span>`;
                container.appendChild(bar);
            });
            info.textContent = `步驟 ${mergeSimStepIndex + 1} / ${mergeSimSteps.length}：${step.text}`;
        }

        function nextMergeSimStep() {
            if (mergeSimSteps.length === 0) {
                initMergeSimulation();
                return;
            }
            if (mergeSimStepIndex < mergeSimSteps.length - 1) {
                mergeSimStepIndex++;
                renderMergeSimulation();
            }
        }

        function resetMergeSimulation() {
            mergeSimStepIndex = 0;
            if (mergeSimSteps.length === 0) {
                initMergeSimulation();
                return;
            }
            renderMergeSimulation();
        }

        function startMergeAutoPlay() {
            if (mergeSimSteps.length === 0) {
                initMergeSimulation();
            }
            stopMergeAutoPlay();
            mergeAutoTimer = setInterval(() => {
                if (mergeSimStepIndex < mergeSimSteps.length - 1) {
                    mergeSimStepIndex++;
                    renderMergeSimulation();
                } else {
                    stopMergeAutoPlay();
                }
            }, 700);
        }

        function stopMergeAutoPlay() {
            if (mergeAutoTimer) {
                clearInterval(mergeAutoTimer);
                mergeAutoTimer = null;
            }
        }
    </script>
</body>
</html>
